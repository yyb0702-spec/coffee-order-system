# 로컬 개발/통합 테스트용 인프라. application.yaml의 접속 정보와 반드시 맞춰야 한다.
# - MySQL   : localhost:3306 / coffee_order_system / root / 12345678
# - Redis   : localhost:6379
# - Kafka   : localhost:9092 (KRaft 단일 브로커, Zookeeper 불필요)
#
# 실행: docker compose -f docker/docker-compose.yml up -d
# 종료: docker compose -f docker/docker-compose.yml down -v

services:
  mysql:
    image: mysql:8.0
    container_name: coffee-order-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "12345678"
      MYSQL_DATABASE: coffee_order_system
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p12345678"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: coffee-order-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    # bitnami/kafka는 2025년부터 Docker Hub 무료 배포가 중단됐다(Bitnami Secure Images 유료 전환).
    # 대신 Apache Kafka 프로젝트가 공식 배포하는 이미지를 쓴다 (무료, 활발히 유지보수됨).
    image: apache/kafka:4.0.2
    container_name: coffee-order-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # KRaft 단일 노드(combined mode): Zookeeper 없이 broker+controller가 한 프로세스에서 동작.
      # 앱은 컨테이너가 아니라 host에서 직접 붙으므로 advertised listener를 localhost:9092로 고정한다.
      # (공식 이미지 문서: https://hub.docker.com/r/apache/kafka 의 단일 노드 예제 그대로)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    # 데이터 볼륨은 마운트하지 않는다 — 로컬 개발/테스트용 토픽 데이터는 `docker compose down` 시
    # 함께 사라져도 무방하고, 이미지 내부 데이터 경로를 문서로 확인하지 못해 임의로 마운트하지 않았다.

volumes:
  mysql-data:
